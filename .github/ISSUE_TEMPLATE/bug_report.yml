name: Bug report
description: Report a problem to help us improve
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the form below.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened? What did you expect to happen?
      placeholder: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Provide exact steps so we can reproduce the issue.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Paste relevant logs (browser console / network) or screenshots.
      render: shell

  - type: input
    id: version
    attributes:
      label: Version / Commit
      description: Which version or commit are you using?
      placeholder: e.g. 1.3.0 or commit SHA

  - type: input
    id: environment
    attributes:
      label: Environment
      description: Your environment details.
      placeholder: e.g. macOS 14 / Node 20 / Chrome 122

